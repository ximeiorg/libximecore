style:
  font_family: ""
  font_size: 14.0
  candidate_count: 5
  horizontal: true
  corner_radius: 8.0
  color_scheme: lavender_purple

color_schemes:
  lavender_purple:
    name: "薰衣草紫"
    primary_color: 0x8F73E2
  ocean_blue:
    name: "海洋蔚蓝"
    primary_color: 0x1A73E8
  forest_green:
    name: "森林翠绿"
    primary_color: 0x2E7D32
  sunset_orange:
    name: "落日橙黄"
    primary_color: 0xE65100
  coral_red:
    name: "珊瑚红"
    primary_color: 0xC62828
  slate_gray:
    name: "石板灰"
    primary_color: 0x424242
  rose_pink:
    name: "玫瑰粉"
    primary_color: 0xAD1457
  teal_cyan:
    name: "青蓝"
    primary_color: 0x00796B

smart_suggestion:
  enabled: true
  suggestion_count: 5
  learning_threshold: 3
  model:
    provider: modelscope
    name: predictive-text-small
    auto_download: false
    files:
      - url: "https://modelscope.cn/models/Kor1/predictive-text-small/resolve/main/vocab.json"
        filename: vocab.json
      - url: "https://modelscope.cn/models/Kor1/predictive-text-small/resolve/main/model.onnx"
        filename: model.onnx
      - url: "https://modelscope.cn/models/Kor1/predictive-text-small/resolve/main/model.onnx.data"
        filename: model.onnx.data
